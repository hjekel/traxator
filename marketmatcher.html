<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketMatcher - Kraakman</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <style>
    :root { --jd-green: #367C2B; --jd-yellow: #FFDE00; --jd-dark: #1a1a1a; --bg: #f5f5f5; --card: #ffffff; --text: #333; --muted: #666; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    header { background: linear-gradient(135deg, var(--jd-green), #2d6a24); color: white; padding: 1rem; text-align: center; }
    header h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    header p { opacity: 0.9; font-size: 0.9rem; }
    .nav-links { display: flex; justify-content: center; gap: 1rem; margin-top: 0.75rem; }
    .nav-links a { color: white; text-decoration: none; padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.85rem; opacity: 0.8; }
    .nav-links a:hover, .nav-links a.active { opacity: 1; background: rgba(255,255,255,0.2); }
    .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
    .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--card); border-radius: 12px; padding: 1rem; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .stat-number { font-size: 2rem; font-weight: 700; color: var(--jd-green); }
    .stat-label { font-size: 0.8rem; color: var(--muted); }
    .section-title { font-size: 1.1rem; color: var(--jd-green); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .match-card { background: var(--card); border-radius: 12px; margin-bottom: 1rem; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .match-header { background: var(--jd-green); color: white; padding: 0.75rem 1rem; display: flex; justify-content: space-between; align-items: center; }
    .match-score { background: var(--jd-yellow); color: var(--jd-green); padding: 0.2rem 0.6rem; border-radius: 12px; font-weight: 700; font-size: 0.85rem; }
    .match-body { padding: 1rem; }
    .match-section { margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #eee; }
    .match-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .match-section h4 { font-size: 0.75rem; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .wanted-text { font-style: italic; color: #555; background: #f9f9f9; padding: 0.75rem; border-left: 3px solid var(--jd-green); border-radius: 0 6px 6px 0; font-size: 0.9rem; }
    .tractor-info { display: flex; justify-content: space-between; align-items: center; }
    .tractor-name { font-weight: 700; color: var(--jd-green); font-size: 1.1rem; }
    .tractor-details { font-size: 0.85rem; color: var(--muted); }
    .tractor-price { font-size: 1.3rem; font-weight: 700; }
    .reasons { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .reason { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 12px; background: #f0f0f0; }
    .reason.positive { background: #e8f5e9; color: #2e7d32; }
    .reason.warning { background: #fff8e1; color: #f57c00; }
    .reason.negative { background: #ffebee; color: #c62828; }
    .reason.hot { background: #ff5722; color: white; }
    .contact-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; border-radius: 6px; text-decoration: none; font-size: 0.85rem; font-weight: 600; }
    .btn-primary { background: var(--jd-green); color: white; }
    .btn-secondary { background: #f0f0f0; color: var(--text); }
    .badge { display: inline-block; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.7rem; font-weight: 700; margin-left: 0.5rem; }
    .badge-hot { background: #ff5722; color: white; }
    .badge-urgent { background: #f44336; color: white; }
    .empty-state { text-align: center; padding: 3rem; color: var(--muted); }
    footer { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.8rem; }
    @media (max-width: 600px) { .stats-bar { grid-template-columns: 1fr; } .tractor-info { flex-direction: column; align-items: flex-start; gap: 0.5rem; } }
  </style>
</head>
<body>
  <header>
    <h1>🎯 MarketMatcher</h1>
    <p>Vind kopers voor je voorraad</p>
    <nav class="nav-links">
      <a href="index.html">🚜 Taxatie</a>
      <a href="marketmatcher.html" class="active">🎯 MarketMatcher</a>
    </nav>
  </header>
  <div class="container">
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-number" id="adCount">0</div><div class="stat-label">Zoekertjes</div></div>
      <div class="stat-card"><div class="stat-number" id="matchCount">0</div><div class="stat-label">Matches</div></div>
      <div class="stat-card"><div class="stat-number" id="hotCount">0</div><div class="stat-label">Hot (60+)</div></div>
    </div>
    <h2 class="section-title">🔥 Matches</h2>
    <div id="matchList"></div>
  </div>
  <footer>
    <p>MarketMatcher v1.0 — Kraakman B.V.</p>
    <p>Demo data — <a href="index.html">Terug naar TraxaTor</a></p>
  </footer>
  <script>
    const INVENTORY = [
      { id: "KR-001", model: "6R 155", year: 2023, hours: 1200, price: 145000, location: "Steenbergen", days: 127, features: ["GPS", "frontloader", "airco"] },
      { id: "KR-002", model: "6M 130", year: 2022, hours: 2500, price: 95000, location: "Steenbergen", days: 94, features: ["airco"] },
      { id: "KR-003", model: "7810", year: 2001, hours: 7500, price: 52000, location: "Maasdam", days: 156, features: [] },
      { id: "KR-004", model: "6R 185", year: 2024, hours: 500, price: 175000, location: "Dronten", days: 45, features: ["GPS", "frontloader", "airco", "CommandPRO"] },
      { id: "KR-005", model: "6M 150", year: 2023, hours: 1800, price: 105000, location: "Oldehove", days: 67, features: ["airco"] },
      { id: "KR-006", model: "6R 175", year: 2022, hours: 2200, price: 155000, location: "Lieshout", days: 112, features: ["GPS", "airco"] },
      { id: "KR-007", model: "6155M", year: 2021, hours: 3500, price: 98000, location: "Reusel", days: 156, features: [] },
      { id: "KR-008", model: "6R 130", year: 2024, hours: 300, price: 125000, location: "Hillegom", days: 21, features: ["GPS", "frontloader", "airco"] },
    ];
    const WANTED_ADS = [
      { id: "W-001", source: "Boerenbusiness", date: "2026-03-20", text: "Gezocht: John Deere 6R 150-160, maximaal 2000 draaiuren, budget rond de 140k. Regio Drenthe.", contact_name: "Jan de Boer", contact_phone: "06-12345678", contact_email: null, region: "Drenthe" },
      { id: "W-002", source: "Marktplaats", date: "2026-03-22", text: "Op zoek naar een tweedehands JD 6M serie, 120-140 pk, niet ouder dan 2020. Max 3000 uur. Budget 80-100k. Graag met airco.", contact_name: null, contact_phone: null, contact_email: "akkerbouwer@email.nl", region: "Flevoland" },
      { id: "W-003", source: "Facebook", date: "2026-03-23", text: "Wie heeft er een oude betrouwbare John Deere 7810 of 7820? Mag ouder zijn, uren niet belangrijk. Budget max 55k.", contact_name: "Piet Jansen", contact_phone: "06-98765432", contact_email: null, region: "Noord-Brabant" },
      { id: "W-004", source: "Boerenbusiness", date: "2026-03-24", text: "Dringend gezocht: krachtige trekker voor loonwerk, 180+ pk, John Deere of Fendt. Liefst met GPS. Budget tot 180k.", contact_name: "Loonbedrijf Smit", contact_phone: "0521-123456", contact_email: "info@loonbedrijfsmit.nl", region: "Overijssel" },
      { id: "W-005", source: "Marktplaats", date: "2026-03-25", text: "Gezocht voor melkveebedrijf: John Deere 6R 130 of 140, met frontlader, max 1500 uur. Hebben max 130k te besteden.", contact_name: "Fam. van Dijk", contact_phone: null, contact_email: "vandijk.melkvee@gmail.com", region: "Friesland" },
    ];
    function parseWantedAd(text) {
      const result = { models: [], modelRange: null, maxHours: null, maxBudget: null, minYear: null, features: [] };
      const textLower = text.toLowerCase();
      const modelPatterns = [/6r\s*1[0-9]{2}/gi, /6m\s*1[0-9]{2}/gi, /7810/gi, /7820/gi, /6155m/gi, /6175m/gi, /7r\s*[0-9]{3}/gi, /8r\s*[0-9]{3}/gi];
      modelPatterns.forEach(p => { const matches = text.match(p); if (matches) matches.forEach(m => { const normalized = m.toUpperCase().replace(/\s+/g, ' ').trim(); if (!result.models.includes(normalized)) result.models.push(normalized); }); });
      const rangeMatch = text.match(/(6[MR]|7R|8R)\s*(\d{3})\s*[-\u2013]\s*(\d{3})/i);
      if (rangeMatch) result.modelRange = { series: rangeMatch[1].toUpperCase(), min: parseInt(rangeMatch[2]), max: parseInt(rangeMatch[3]) };
      const hoursMatch = textLower.match(/max\.?\s*(\d+)\s*(uur|draaiuren)/);
      if (hoursMatch) result.maxHours = parseInt(hoursMatch[1]);
      const budgetMatch = textLower.match(/budget[:\s]*(rond\s*de\s*)?(\d+)\s*k/);
      if (budgetMatch) result.maxBudget = parseInt(budgetMatch[2]) * 1000;
      const maxMatch = textLower.match(/(max|tot)\s*(\d+)\s*k/);
      if (maxMatch && !result.maxBudget) result.maxBudget = parseInt(maxMatch[2]) * 1000;
      const yearMatch = textLower.match(/niet ouder dan\s*(20\d{2})/);
      if (yearMatch) result.minYear = parseInt(yearMatch[1]);
      if (textLower.includes('gps')) result.features.push('GPS');
      if (textLower.includes('frontlader') || textLower.includes('frontloader')) result.features.push('frontloader');
      if (textLower.includes('airco')) result.features.push('airco');
      return result;
    }
    function matchInventory(ad, inventory) {
      const parsed = parseWantedAd(ad.text);
      const matches = [];
      inventory.forEach(item => {
        let score = 0; const reasons = [];
        if (parsed.models.length > 0) { const itemModel = item.model.toUpperCase().replace(/\s+/g, ' '); if (parsed.models.some(m => itemModel.includes(m.replace(/\s+/g, '')) || m.replace(/\s+/g, '').includes(itemModel.replace(/\s+/g, '')))) { score += 40; reasons.push({ text: 'Model: ' + item.model, type: 'positive' }); } }
        if (parsed.modelRange) { const itemSeries = item.model.split(' ')[0]; const itemNum = parseInt(item.model.split(' ')[1] || (item.model.match(/\d+/) || ['0'])[0]); if (itemSeries === parsed.modelRange.series && itemNum >= parsed.modelRange.min && itemNum <= parsed.modelRange.max) { score += 40; reasons.push({ text: 'In range ' + parsed.modelRange.series + ' ' + parsed.modelRange.min + '-' + parsed.modelRange.max, type: 'positive' }); } }
        if (parsed.maxHours) { if (item.hours <= parsed.maxHours) { score += 15; reasons.push({ text: item.hours + ' uur OK', type: 'positive' }); } else { score -= 10; reasons.push({ text: item.hours + ' uur > max ' + parsed.maxHours, type: 'warning' }); } }
        if (parsed.maxBudget) { if (item.price <= parsed.maxBudget) { score += 20; reasons.push({ text: 'Binnen budget', type: 'positive' }); } else if (item.price <= parsed.maxBudget * 1.1) { score += 5; reasons.push({ text: 'Net boven budget (+' + Math.round((item.price/parsed.maxBudget-1)*100) + '%)', type: 'warning' }); } else { score -= 15; reasons.push({ text: 'Boven budget', type: 'negative' }); } }
        if (parsed.minYear && item.year >= parsed.minYear) { score += 10; reasons.push({ text: 'Bouwjaar ' + item.year + ' OK', type: 'positive' }); }
        if (parsed.features.length > 0) { const matched = parsed.features.filter(f => item.features.map(x => x.toLowerCase()).includes(f.toLowerCase())); if (matched.length > 0) { score += matched.length * 5; reasons.push({ text: 'Features: ' + matched.join(', '), type: 'positive' }); } }
        if (item.days > 90) { score += 10; reasons.push({ text: item.days + ' dagen - graag verkopen!', type: 'hot' }); }
        if (score >= 20) matches.push({ item, score: Math.min(score, 100), reasons, ad });
      });
      return matches.sort((a, b) => b.score - a.score);
    }
    function renderMatches() {
      let allMatches = [];
      WANTED_ADS.forEach(ad => { allMatches = allMatches.concat(matchInventory(ad, INVENTORY)); });
      allMatches.sort((a, b) => b.score - a.score);
      document.getElementById('adCount').textContent = WANTED_ADS.length;
      document.getElementById('matchCount').textContent = allMatches.length;
      document.getElementById('hotCount').textContent = allMatches.filter(m => m.score >= 60).length;
      const list = document.getElementById('matchList');
      if (allMatches.length === 0) { list.innerHTML = '<div class="empty-state">Geen matches gevonden</div>'; return; }
      list.innerHTML = allMatches.slice(0, 20).map((match, i) => {
        const { item, score, reasons, ad } = match;
        const isHot = score >= 70; const isUrgent = item.days > 120;
        let badges = ''; if (isHot) badges += '<span class="badge badge-hot">HOT</span>'; if (isUrgent) badges += '<span class="badge badge-urgent">URGENT</span>';
        const contactBtns = [];
        if (ad.contact_phone) contactBtns.push('<a href="tel:' + ad.contact_phone + '" class="btn btn-primary">📞 ' + ad.contact_phone + '</a>');
        if (ad.contact_email) contactBtns.push('<a href="mailto:' + ad.contact_email + '" class="btn btn-secondary">📧 Email</a>');
        return '<div class="match-card"><div class="match-header"><span>Match #' + (i+1) + ' ' + badges + '</span><span class="match-score">' + score + '/100</span></div><div class="match-body"><div class="match-section"><h4>📋 Zoekertje (' + ad.source + ')</h4><p class="wanted-text">"' + ad.text + '"</p><p style="font-size:0.8rem;color:#666;margin-top:0.5rem">Regio: ' + ad.region + ' | ' + ad.date + '</p></div><div class="match-section"><h4>🚜 Jouw voorraad</h4><div class="tractor-info"><div><div class="tractor-name">John Deere ' + item.model + '</div><div class="tractor-details">' + item.year + ' \u00b7 ' + item.hours.toLocaleString("nl-NL") + ' uur \u00b7 ' + item.location + ' \u00b7 ' + item.days + ' dagen</div></div><div class="tractor-price">\u20ac' + item.price.toLocaleString("nl-NL") + '</div></div></div><div class="match-section"><h4>📊 Match details</h4><div class="reasons">' + reasons.map(r => '<span class="reason ' + r.type + '">' + r.text + '</span>').join('') + '</div></div><div class="match-section"><h4>👤 Contact: ' + (ad.contact_name || 'Onbekend') + '</h4><div class="contact-buttons">' + (contactBtns.length > 0 ? contactBtns.join('') : '<span style="color:#666">Geen contactinfo</span>') + '</div></div></div></div>';
      }).join('');
    }
    renderMatches();
  </script>
</body>
</html>
